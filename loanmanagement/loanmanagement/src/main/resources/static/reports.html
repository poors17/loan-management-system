<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loan Reports</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header, footer {
      background: #0059b3;
      color: white;
      padding: 20px;
      position: relative;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 1.6rem;
    }
    .top-buttons {
      display: flex;
      gap: 10px;
    }
    .btn {
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .btn:hover {
      background: #e6e6e6;
    }
    .logout-btn {
      background-color: #d9534f;
      color: white;
    }
    .logout-btn:hover {
      background-color: #c9302c;
    }
    #languageBtn {
      background-color: #007bff;
      color: white;
    }
    #languageBtn:hover {
       background-color: #0069d9;
    }
    footer {
      background: #001f3f;
      color: white;
      text-align: center;
      font-size: 0.9rem;
      margin-top: auto;
    }
    .container {
      flex: 1;
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }
    h2 {
      color: #003366;
      margin-bottom: 20px;
      text-align: center;
    }
    section {
      margin-bottom: 40px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1 id="pageTitle">Loan Reports</h1>
  <div class="top-buttons">
    <button class="btn" onclick="toggleLanguage()" id="languageBtn">தமிழ்</button>
    <button class="btn logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <section>
    <h2 id="summaryTitle">Loan Summary</h2>
    <table>
      <tbody id="loanSummaryBody"></tbody>
    </table>
  </section>

  <section>
    <h2 id="emiTitle">EMI Collections (Current Year)</h2>
    <table id="emiTable">
      <thead>
        <tr>
          <th id="monthTh">Month</th>
          <th id="amountTh">Amount Collected</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2 id="overdueTitle">Overdue Loans (30+ days)</h2>
    <table id="overdueLoansTable">
      <thead>
        <tr>
          <th id="userIdTh">Loan ID</th>
          <th id="loanAmtTh">Amount</th>
          <th id="statusTh">Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<footer>
  &copy; 2025 Loan Management System. All rights reserved.
</footer>

<script>
  function logout() {
    window.location.href = 'home.html';
  }

  async function loadLoanSummary() {
    try {
      const response = await fetch('https://loan-management-system-1-5z32.onrender.com/reports/loan-summary');
      if (!response.ok) throw new Error('Network error');
      const summary = await response.json();

      const tbody = document.getElementById('loanSummaryBody');
      tbody.innerHTML = `
        <tr><th id="totalLoansLabel">Total Loans</th><td>${summary.totalLoans}</td></tr>
        <tr><th id="approvedLabel">Approved</th><td>${summary.approved}</td></tr>
        <tr><th id="rejectedLabel">Rejected</th><td>${summary.rejected}</td></tr>
        <tr><th id="pendingLabel">Pending</th><td>${summary.pending}</td></tr>
        <tr><th id="totalAmountLabel">Total Amount</th><td>${summary.totalAmount.toFixed(2)}</td></tr>
      `;
    } catch (error) {
      console.error('Loan Summary Error:', error);
    }
  }

  async function loadEmiCollections() {
    try {
      const response = await fetch('https://loan-management-system-1-5z32.onrender.com/reports/emi');
      const data = await response.json();
      const tbody = document.querySelector('#emiTable tbody');
      tbody.innerHTML = '';
      Object.entries(data).forEach(([month, amount]) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${month}</td><td>${amount.toFixed(2)}</td>`;
        tbody.appendChild(row);
      });
    } catch (error) {
      console.error('EMI Error:', error);
    }
  }

  async function loadOverdueLoans() {
  try {
    const response = await fetch('https://loan-management-system-1-5z32.onrender.com/reports/overdue');
    if (!response.ok) throw new Error('Failed to fetch overdue loans');
    
    const loans = await response.json();
    const tbody = document.querySelector('#overdueLoansTable tbody');
    tbody.innerHTML = '';

    if (!loans || loans.length === 0) {
      tbody.innerHTML = `<tr><td colspan="3">No overdue loans found</td></tr>`;
      return;
    }

    loans.forEach(loan => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${loan.userId || loan.id || 'N/A'}</td>
        <td>${loan.amount ? loan.amount.toFixed(2) : (loan.loanAmount ? loan.loanAmount.toFixed(2) : '0.00')}</td>
        <td>${loan.status || 'N/A'}</td>
      `;
      tbody.appendChild(row);
    });

  } catch (error) {
    console.error('Overdue Error:', error);
    const tbody = document.querySelector('#overdueLoansTable tbody');
    tbody.innerHTML = `<tr><td colspan="3" style="color:red;">Error loading overdue loans</td></tr>`;
  }
}


  const translations = {
    ta: {
      pageTitle: "கடன் அறிக்கைகள்",
      languageBtn: "English",
      summaryTitle: "கடன் சுருக்கம்",
      emiTitle: "EMI வசூல்கள் (இந்த ஆண்டு)",
      overdueTitle: "தாமதமான கடன்கள் (30+ நாட்கள்)",
      monthTh: "மாதம்",
      amountTh: "வசூலிக்கப்பட்ட தொகை",
      userIdTh: "தொகை ஐடி",
      loanAmtTh: "தொகை",
      statusTh: "நிலை",
      totalLoansLabel: "மொத்த கடன்கள்",
      approvedLabel: "அங்கீகரிக்கப்பட்டது",
      rejectedLabel: "நிராகரிக்கப்பட்டது",
      pendingLabel: "நிலுவையில்",
      totalAmountLabel: "மொத்த தொகை"
    },
    en: {
      pageTitle: "Loan Reports",
      languageBtn: "தமிழ்",
      summaryTitle: "Loan Summary",
      emiTitle: "EMI Collections (Current Year)",
      overdueTitle: "Overdue Loans (30+ days)",
      monthTh: "Month",
      amountTh: "Amount Collected",
      userIdTh: "Loan ID",
      loanAmtTh: "Amount",
      statusTh: "Status",
      totalLoansLabel: "Total Loans",
      approvedLabel: "Approved",
      rejectedLabel: "Rejected",
      pendingLabel: "Pending",
      totalAmountLabel: "Total Amount"
    }
  };

  let currentLang = "en";

  function toggleLanguage() {
    currentLang = currentLang === "en" ? "ta" : "en";
    const t = translations[currentLang];
    for (const id in t) {
      const el = document.getElementById(id);
      if (el) el.innerText = t[id];
    }
  }

  window.onload = () => {
    loadLoanSummary();
    loadEmiCollections();
    loadOverdueLoans();
  };
</script>
</body>
</html>
