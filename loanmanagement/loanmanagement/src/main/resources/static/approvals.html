// EMI Calculation Function
function calculateEMI(principal, annualRate, months) {
  const monthlyRate = (annualRate / 100) / 12;
  const emi = (principal * monthlyRate * (1 + monthlyRate) ** months) / ((1 + monthlyRate) ** months - 1);
  return emi.toFixed(2); // Returns EMI rounded to two decimal places
}

// Update Loan Status
async function updateStatus(loanId, status) {
  const endpoint = status === 'APPROVED'
    ? `${API_BASE}/api/loan-approvals/approve/${loanId}`
    : `${API_BASE}/api/loan-approvals/reject/${loanId}`;

  try {
    const res = await fetch(endpoint, { method: 'PUT' });

    if (res.ok) {
      document.getElementById('message').textContent =
        lang === 'TA' ? 'நிலைமை புதுப்பிக்கப்பட்டது!' : 'Loan status updated!';

    } else {
      document.getElementById('message').textContent =
        lang === 'TA' ? 'நிலைமை புதுப்பிக்க தவறியது.' : 'Failed to update loan status.';

      lang === 'TA' ? 'சர்வர் பிழை.' : 'Server error.';
