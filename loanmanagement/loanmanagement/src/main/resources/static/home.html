<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Loan Management System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header, footer {
      background: #0059b3;
      color: white;
      text-align: left;
      padding: 30px 20px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    footer {
      background: #001f3f;
      font-weight: normal;
      text-align: center;
      font-size: 0.9rem;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrapper {
      display: flex;
      background: #f3f7fd;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      animation: fadeInUp 0.7s ease;
    }

    .form-section {
      flex: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 300px;
    }

    .image-section {
      flex: 1;
      background: #f3f7fd;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-section img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
    }

    h2 {
      margin-bottom: 20px;
      color: #003366;
    }

    input, button {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      background-color: #0052cc;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #003d99;
    }

    .lang-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .lang-btn {
      flex: 1;
      padding: 8px;
      background: #003d99;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .lang-btn:hover {
      background: #002c6a;
    }

    .error {
      color: red;
      font-size: 0.9rem;
      min-height: 18px;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column;
        border-radius: 0;
      }

      .image-section {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <header data-en="Loan Management System" data-ta="கடன் மேலாண்மை அமைப்பு">Loan Management System</header>

  <div class="main">
    <div class="wrapper">
      <!-- Form Section -->
      <div class="form-section">
        <div class="lang-toggle">
          <button class="lang-btn" onclick="setLanguage('en')">English</button>
          <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
        </div>

        <!-- Login Form -->
        <div id="loginFormDiv">
          <h2 data-en="Login" data-ta="உள்நுழை">Login</h2>
          <form id="loginForm">
            <input type="text" id="loginUsername" data-en-ph="Username" data-ta-ph="பயனர்பெயர்" placeholder="Username" required />
            <input type="password" id="loginPassword" data-en-ph="Password" data-ta-ph="கடவுச்சொல்" placeholder="Password" required />
            <button type="submit" data-en="Login" data-ta="உள்நுழை">Login</button>
            <p id="loginMessage" class="error"></p>
          </form>
          <div class="switch">
            <p data-en="Don't have an account?" data-ta="கணக்கு இல்லையா?">Don't have an account?</p>
            <button onclick="window.location.href='register.html'" data-en="Register Here" data-ta="இங்கே பதிவு செய்க">Register Here</button>
          </div>
        </div>
      </div>

      <!-- Image Section -->
      <div class="image-section">
        <img src="loginimg.png" alt="Login Illustration" />
      </div>
    </div>
  </div>

  <footer data-en="© 2025 Loan Management System. All rights reserved." data-ta="© 2025 கடன் மேலாண்மை அமைப்பு. அனைத்து உரிமைகளும் பாதுகாக்கப்பட்டவை.">
    © 2025 Loan Management System. All rights reserved.
  </footer>

  <script>
    // Login request
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      const res = await fetch('https://loan-management-system-1-5z32.onrender.com/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const msg = document.getElementById('loginMessage');

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('userId', data.id);
        localStorage.setItem('role', data.role);
        localStorage.setItem('username', data.username);
        window.location.href = 'dashboard.html';
      } else {
        const errorText = await res.text();
        msg.textContent = errorText || 'Invalid credentials';
      }
    });

    // Language Switch
    function setLanguage(lang) {
      const elements = document.querySelectorAll('[data-en]');
      elements.forEach(el => {
        el.textContent = el.getAttribute(`data-${lang}`);
      });

      // Update placeholders separately
      const inputs = document.querySelectorAll('[data-en-ph]');
      inputs.forEach(input => {
        input.placeholder = input.getAttribute(`data-${lang}-ph`);
      });
    }

    // Default: English
    setLanguage('en');
  </script>
</body>
</html>
