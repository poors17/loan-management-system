<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Loan Management System</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header, footer {
      background: #0059b3;
      color: white;
      text-align: left;
      padding: 30px 20px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    footer {
      background: #001f3f;
      font-weight: normal;
      text-align: center;
      font-size: 0.9rem;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .wrapper {
      display: flex;
      background: #f3f7fd;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      max-width: 1000px;
      width: 100%;
      animation: fadeInUp 0.7s ease;
    }

    .form-section {
      flex: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 300px;
    }

    .image-section {
      flex: 1;
      background: #f3f7fd;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-section img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
    }

    h2 {
      margin-bottom: 20px;
      color: #003366;
    }

    input, button {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      background-color: #0052cc;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #003d99;
    }

    .lang-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .lang-btn {
      flex: 1;
      padding: 8px;
      background: #003d99;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      color: white;
    }

    .lang-btn:hover {
      background: #002c6a;
    }

    .error {
      color: red;
      font-size: 0.9rem;
      min-height: 18px;
    }

    .switch {
      text-align: center;
      margin-top: 15px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .wrapper {
        flex-direction: column;
        border-radius: 0;
      }

      .image-section {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <header>Loan Management System</header>

  <div class="main">
    <div class="wrapper">
      <!-- Register Form Section -->
      <div class="form-section">
        <div class="lang-toggle">
          <button class="lang-btn" onclick="setLanguage('en')">English</button>
          <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
        </div>

        <h2 data-en="Register" data-ta="பதிவு">Register</h2>
        <form id="registerForm">
          <input type="text" id="regUsername" placeholder="Username" data-en="Username" data-ta="பயனர் பெயர்" required />
          <input type="password" id="regPassword" placeholder="Password" data-en="Password" data-ta="கடவுச்சொல்" required />
          <button type="submit" data-en="Register" data-ta="பதிவு">Register</button>
          <p id="registerMessage" class="error"></p>
        </form>

        <div class="switch">
          <p id="switchText" data-en="Already have an account?" data-ta="ஏற்கணேவே கணக்கு உள்ளதா?">Already have an account?</p>
          <a href="home.html">
            <button id="loginHereBtn" data-en="Login Here" data-ta="இங்கே உள்நுழை">Login Here</button>
          </a>
        </div>
      </div>

      <div class="image-section">
        <img src="loginimg.png" alt="Register Illustration" />
      </div>
    </div>
  </div>

  <footer>&copy; 2025 Loan Management System. All rights reserved.</footer>

  <script>
    // Set default language
    let currentLang = 'en';

    function setLanguage(lang) {
      currentLang = lang;

      // Elements with data-en and data-ta attributes to translate
      const translatableElements = document.querySelectorAll('[data-en][data-ta]');

      translatableElements.forEach(el => {
        if (el.placeholder !== undefined && el.hasAttribute('placeholder')) {
          // Translate placeholder attribute if present
          el.placeholder = el.getAttribute(`data-${lang}`);
        }
        if (el.tagName.toLowerCase() === 'input') {
          // Also translate value if input is button (rare case, here no buttons are inputs)
          if (el.type === 'button' || el.type === 'submit') {
            el.value = el.getAttribute(`data-${lang}`);
          }
        } else {
          // Translate text content
          el.textContent = el.getAttribute(`data-${lang}`);
        }
      });
    }

    // Initialize language on page load
    window.onload = () => {
      setLanguage(currentLang);
    };

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const role = "CUSTOMER";  // default role
      const msg = document.getElementById('registerMessage');

      try {
        const res = await fetch('http://localhost:8080/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role })
        });

        if (res.ok) {
          alert(currentLang === 'ta' ? "பதிவு வெற்றி! தயவுசெய்து உள்நுழைக." : "Registration successful! Please login.");
          window.location.href = 'home.html';
        } else {
          let errorMessage = currentLang === 'ta' ? 'பதிவு தோல்வியடைந்தது' : 'Registration failed';
          try {
            const data = await res.json();
            if (typeof data === 'string') {
              errorMessage = data;
            } else if (data.message) {
              errorMessage = data.message;
            } else {
              errorMessage = JSON.stringify(data);
            }
          } catch {
            errorMessage = await res.text();
          }
          msg.textContent = errorMessage || (currentLang === 'ta' ? 'பதிவு தோல்வியடைந்தது' : 'Registration failed');
        }
      } catch (err) {
        msg.textContent = currentLang === 'ta' ? 'ஏதோ ஒரு பிரச்சனை ஏற்பட்டுள்ளது. மீண்டும் முயற்சிக்கவும்.' : 'Something went wrong. Please try again.';
        console.error('Registration error:', err);
      }
    });
  </script>
</body>
</html>
