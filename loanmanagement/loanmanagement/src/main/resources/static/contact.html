<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Loan Management System</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f8ff;
      color: #003366;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #0059b3;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    nav a.active,
    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 700px;
      margin: 50px auto;
      padding: 30px;
      background-color: white;
      box-shadow: 0 8px 16px rgba(0, 89, 179, 0.2);
      border-radius: 10px;
      animation: fadeInUp 1s ease-in-out;
    }

    h2 {
      text-align: center;
      color: #004080;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea {
      padding: 10px;
      border: 1px solid #cce0ff;
      border-radius: 5px;
      margin-bottom: 20px;
      transition: all 0.3s ease-in-out;
    }

    input:focus, textarea:focus {
      border-color: #0059b3;
      outline: none;
      box-shadow: 0 0 5px #80bfff;
    }

    button {
      background-color: #0059b3;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #004080;
    }

    .success, .error {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    footer {
      margin-top: auto;
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px 0;
    }

    @keyframes fadeInUp {
      0% {
        transform: translateY(30px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .container {
        margin: 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Loan Management System</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="#" class="active">Contact Us</a>
    </nav>
  </header>

  <div class="container">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="Enter your name" required />

      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="Enter your email" required />

      <label for="message">Message</label>
      <textarea id="message" rows="5" placeholder="Type your message here..." required></textarea>

      <button type="submit">Send Message</button>
      <div id="responseMsg" class=""></div>
    </form>
  </div>

  <footer>
    <p>&copy; 2025 Loan Management System. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const responseDiv = document.getElementById("responseMsg");

      fetch("http://localhost:8080/contact", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, message })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          responseDiv.className = "success";
          responseDiv.textContent = "Message sent successfully!";
          document.getElementById("contactForm").reset();
        } else {
          responseDiv.className = "error";
          responseDiv.textContent = "Failed to send message.";
        }
      })
      .catch(error => {
        responseDiv.className = "error";
        responseDiv.textContent = "Error sending message.";
        console.error("Error:", error);
      });
    });
  </script>
</body>
</html>
